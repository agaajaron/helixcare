name: ci

on:
  push:
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install system deps (for llama-cpp build)
        run: sudo apt-get update && sudo apt-get install -y build-essential cmake
      - name: Install Python deps
        run: pip install -r docker/requirements.txt ruff
      - name: Lint
        run: ruff check .
      - name: Build policy index
        run: python -c "from app.rag.index_builder import build_policy_index; build_policy_index()"
      - name: Smoke test orchestrator (no secrets)
        env:
          # Set to empty to force fallback to llama-cpp (model not present) – orchestrator should still import
          OPENAI_API_KEY: ""
        run: |
          python - << 'PY'
          from app.orchestrator import run_mri_pa_flow
          try:
              out = run_mri_pa_flow("M123")
              print(out[:500])
          except Exception as e:
              # Allow exit 0 if model missing; repo compiles and imports
              print("Smoke test note:", e)
          PY
