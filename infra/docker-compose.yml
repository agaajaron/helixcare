version: "3.9"

services:
  orchestrator:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - ../:/app
    command: bash -lc "python examples/run_prior_auth_flow.py"
    ports:
      - "8080:8080"

  nats:
    image: nats:2.10
    ports:
      - "4222:4222"

  postgres:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: helixcare
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    ports:
      - "6379:6379"
